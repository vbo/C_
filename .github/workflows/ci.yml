name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore C_.sln

      - name: Build
        run: dotnet build C_.sln -c Release --no-restore

      - name: Test
        run: dotnet test C_.sln -c Release --no-build --verbosity normal
